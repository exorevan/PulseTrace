# PulseTrace example configuration
# Copy this file and fill in your own paths.

app:
  mode: global          # global | local
  output_format: console  # console | json | html

logging:
  level: INFO           # DEBUG | INFO | WARNING | ERROR
  file: null            # path to log file, or null for stdout

# ── Model ─────────────────────────────────────────────────────────────────────
# sklearn (.pkl via joblib):
model:
  type: sklearn
  path: weights/my_model.pkl

# Keras / TensorFlow (.keras or SavedModel directory):
# model:
#   type: keras
#   path: weights/my_model.keras

# PyTorch (state-dict .pt + separate architecture file):
# model:
#   type: pt
#   weights_path: weights/my_model.pt
#   architecture:
#     path: src/my_arch.py
#     class_name: MyNet
#     init_params:
#       hidden_size: 128
#   task: classification   # classification | regression

# ── Dataset ───────────────────────────────────────────────────────────────────
dataset:
  type: csv
  path: datasets/my_data.csv
  delimiter: ","
  header: 0             # row index of header (0 = first row), or null if no header
  index_col: null       # column name/index to use as row index, or null
  only_x: false         # true = treat all columns as features (no target column)

# Built-in datasets (no local file needed):
# dataset:
#   type: builtin
#   name: iris            # sklearn: iris, wine, breast_cancer, digits, california_housing, diabetes
#                         # keras:   mnist, cifar10, fashion_mnist
#   split: train          # train | test  (keras only; ignored for sklearn)
#   max_samples: null     # cap number of samples loaded (null = all)

# ── Explainer ─────────────────────────────────────────────────────────────────
explainer:
  type: lime            # lime | shap
  num_features: 10      # max features shown in output
  num_samples: 5000     # LIME: perturbations per instance (ignored by SHAP)
  global_samples: 10    # LIME: dataset instances averaged for global mode (ignored by SHAP)

# ── Local mode (required when app.mode == local) ──────────────────────────────
# local:
#   dataset:
#     type: csv
#     path: datasets/my_sample.csv
#     only_x: true
